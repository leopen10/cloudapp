# .github/workflows/cd-deploy.yml
name: CD — Deploy Production

on:
  workflow_run:
    workflows: ['CI — Build & Push']
    types: [completed]

jobs:

  deploy:
    name: Déploiement sur VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /opt/cloudapp
            git fetch --all --prune
            git reset --hard origin/main
            docker network create --driver overlay --attachable traefik-public 2>/dev/null || true
            docker network create --driver overlay --internal internal 2>/dev/null || true
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            docker stack deploy -c docker-compose.prod.yml cloudapp --with-registry-auth
            echo "=== Services déployés ==="
            docker service ls

      - name: Notification Slack — Succès
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "🚀 *Déploiement terminé avec succès !*",
            "attachments": [{
              "color": "good",
              "fields": [
                {"title": "Repository", "value": "${{ github.repository }}", "short": true},
                {"title": "Auteur", "value": "${{ github.actor }}", "short": true},
                {"title": "Status", "value": "✅ En production", "short": true}
              ]
            }]
          }'

      - name: Notification Slack — Échec
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "❌ *Déploiement échoué !*",
            "attachments": [{
              "color": "danger",
              "fields": [
                {"title": "Repository", "value": "${{ github.repository }}", "short": true},
                {"title": "Auteur", "value": "${{ github.actor }}", "short": true},
                {"title": "Status", "value": "❌ Échec", "short": true}
              ]
            }]
          }'