# .github/workflows/ci-build-push.yml
# Déclenché après un merge sur la branche main

name: CI — Build & Push

on:
  push:
    branches: [main]

concurrency:
  group: ci-main
  cancel-in-progress: true

jobs:

  # ── Build de tous les services en parallèle ───────────────────────────────
  build-all:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [auth, project, billing, notification, analytics, gateway]
      max-parallel: 6

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build & Push image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cloudapp-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/cloudapp-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotation du cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Scan de sécurité Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/cloudapp-${{ matrix.service }}:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ── Notification Slack ────────────────────────────────────────────────────
  notify:
    name: Notification Slack
    runs-on: ubuntu-latest
    needs: build-all
    if: always()

    steps:
      - name: Notification succès
        if: ${{ needs.build-all.result == 'success' }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "✅ *Build & Push — Toutes les images Docker publiées !*",
            "attachments": [{
              "color": "good",
              "fields": [
                {"title": "Repository", "value": "${{ github.repository }}", "short": true},
                {"title": "Auteur", "value": "${{ github.actor }}", "short": true},
                {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                {"title": "Status", "value": "✅ Succès", "short": true}
              ]
            }]
          }'

      - name: Notification échec
        if: ${{ needs.build-all.result == 'failure' }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "❌ *Build & Push — Échec du build !*",
            "attachments": [{
              "color": "danger",
              "fields": [
                {"title": "Repository", "value": "${{ github.repository }}", "short": true},
                {"title": "Auteur", "value": "${{ github.actor }}", "short": true},
                {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                {"title": "Status", "value": "❌ Échec", "short": true}
              ]
            }]
          }'