# .github/workflows/ci-pull-request.yml
# Déclenché à chaque Pull Request sur la branche main

name: CI — Pull Request

on:
  pull_request:
    branches: [main]

jobs:

  # ── Job 1 : Tests unitaires ──────────────────────────────────────────────
  unit-tests:
    name: Tests Unitaires
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [auth, project, billing, notification, analytics, gateway]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: |
          pip install fastapi uvicorn pydantic httpx pytest pytest-asyncio coverage

      - name: Lancement des tests unitaires
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short

      - name: Rapport de coverage
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ --cov=app --cov-report=term-missing

  # ── Job 2 : Tests d'intégration ──────────────────────────────────────────
  integration-tests:
    name: Tests d'Intégration
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: |
          pip install fastapi uvicorn pydantic httpx pytest pytest-asyncio coverage

      - name: Démarrage des services avec Docker Compose
        run: |
          docker compose -f docker-compose.test.yml up -d --build

      - name: Attente du démarrage des services
        run: sleep 15

      - name: Vérification des services
        run: docker compose -f docker-compose.test.yml ps

      - name: Arrêt des services
        if: always()
        run: docker compose -f docker-compose.test.yml down

  # ── Job 3 : Notification Slack ───────────────────────────────────────────
  notify:
    name: Notification Slack
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Notification succès
        if: ${{ needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success' }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "✅ *Pull Request — Tous les tests passés !*",
            "attachments": [{
              "color": "good",
              "fields": [
                {"title": "Repository", "value": "${{ github.repository }}", "short": true},
                {"title": "Auteur", "value": "${{ github.actor }}", "short": true},
                {"title": "Branch", "value": "${{ github.head_ref }}", "short": true},
                {"title": "Status", "value": "✅ Succès", "short": true}
              ]
            }]
          }'

      - name: Notification échec
        if: ${{ needs.unit-tests.result == 'failure' || needs.integration-tests.result == 'failure' }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "❌ *Pull Request — Tests échoués !*",
            "attachments": [{
              "color": "danger",
              "fields": [
                {"title": "Repository", "value": "${{ github.repository }}", "short": true},
                {"title": "Auteur", "value": "${{ github.actor }}", "short": true},
                {"title": "Branch", "value": "${{ github.head_ref }}", "short": true},
                {"title": "Status", "value": "❌ Échec", "short": true}
              ]
            }]
          }'