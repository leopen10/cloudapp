version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cloudapp2026
      POSTGRES_DB: cloudapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cloudapp-network

  auth:
    build: ./services/auth
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:cloudapp2026@postgres:5432/cloudapp_db
      SECRET_KEY: cloudapp_jwt_secret_2026
    depends_on:
      - postgres
    networks:
      - cloudapp-network

  project:
    build: ./services/project
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:cloudapp2026@postgres:5432/cloudapp_db
    depends_on:
      - postgres
    networks:
      - cloudapp-network

  billing:
    build: ./services/billing
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://postgres:cloudapp2026@postgres:5432/cloudapp_db
    depends_on:
      - postgres
    networks:
      - cloudapp-network

  notification:
    build: ./services/notification
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://postgres:cloudapp2026@postgres:5432/cloudapp_db
    depends_on:
      - postgres
    networks:
      - cloudapp-network

  analytics:
    build: ./services/analytics
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://postgres:cloudapp2026@postgres:5432/cloudapp_db
    depends_on:
      - postgres
    networks:
      - cloudapp-network

  gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth
      - project
      - billing
      - notification
      - analytics
    networks:
      - cloudapp-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - cloudapp-network

volumes:
  postgres_data:

networks:
  cloudapp-network:
    driver: bridge